<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KidsTV">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>KidsTV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    :root {
      --bg: #0f0e17;
      --bg2: #1a1929;
      --card: #1f1e30;
      --card2: #27263a;
      --text: #fffffe;
      --muted: #8b8fa8;
      --accent: #e8b84b;
      --radius: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    .scroll-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .btn-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--card2); border: none;
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-icon:active { background: #3a3860; }

    .screen-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .screen-title { font-size: 20px; font-weight: 700; }

    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ═══════════════════════════════════
       SCREEN 1 — PROFILE SELECTION
    ═══════════════════════════════════ */
    #screen-profiles {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .profiles-logo { font-size: 44px; margin-bottom: 4px; }
    .profiles-headline { font-size: clamp(26px,5vw,44px); font-weight: 800; color: var(--accent); margin-bottom: 10px; text-align: center; }
    .profiles-sub { font-size: 15px; color: var(--muted); margin-bottom: 44px; text-align: center; }
    .profiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 18px; width: 100%; max-width: 680px;
    }
    .profile-card {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 26px 12px; background: var(--card);
      border-radius: var(--radius); cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .profile-card:active { transform: scale(0.93); }
    .profile-card:hover { border-color: rgba(255,255,255,0.15); }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 800; color: white;
    }
    .profile-card-name { font-size: 16px; font-weight: 700; text-align: center; }
    .profile-card-subs { font-size: 12px; color: var(--muted); }
    .parent-btn {
      margin-top: 36px;
      display: flex; align-items: center; gap: 10px;
      padding: 13px 28px; background: transparent;
      border: 2px solid rgba(255,255,255,0.12); border-radius: 100px;
      color: var(--muted); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .parent-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ═══════════════════════════════════
       SCREEN 2 — KID HOME
    ═══════════════════════════════════ */
    #screen-kid-home { background: var(--bg); }
    .kid-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 20px 0; flex-shrink: 0;
    }
    .kid-greeting { font-size: 22px; font-weight: 800; cursor: default; user-select: none; }
    .kid-greeting em { color: var(--accent); font-style: normal; }
    .kid-home-scroll { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
    }
    .cat-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 14px;
    }
    @media (min-width: 560px) { .cat-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 800px) { .cat-grid { grid-template-columns: repeat(4,1fr); } }
    .cat-card {
      aspect-ratio: 1; border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: transform 0.15s;
    }
    .cat-card:active { transform: scale(0.91); }
    .cat-card-emoji { font-size: clamp(36px,8vw,52px); line-height: 1; }
    .cat-card-name {
      font-size: clamp(13px,2.8vw,16px); font-weight: 800;
      text-align: center; color: white;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6); padding: 0 8px;
    }
    .empty-subs {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 40px;
    }
    .empty-subs .big { font-size: 68px; }
    .empty-subs h2 { font-size: 22px; font-weight: 800; }
    .empty-subs p { color: var(--muted); font-size: 15px; line-height: 1.5; }
    .explore-btn {
      width: 100%; padding: 15px; background: var(--card);
      border: 2px dashed rgba(255,255,255,0.12); border-radius: var(--radius);
      color: var(--muted); font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .explore-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ═══════════════════════════════════
       SCREEN 3 — EXPLORE / SUBSCRIBE
    ═══════════════════════════════════ */
    #screen-explore { background: var(--bg); }
    .explore-list { display: flex; flex-direction: column; gap: 10px; padding: 16px; }
    .explore-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; background: var(--card); border-radius: var(--radius);
    }
    .explore-icon {
      width: 54px; height: 54px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .explore-info { flex: 1; min-width: 0; }
    .explore-name { font-size: 15px; font-weight: 700; }
    .explore-channels { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .sub-btn {
      padding: 9px 16px; border-radius: 100px; border: 2px solid;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0; white-space: nowrap;
    }
    .sub-btn.on { background: var(--accent); border-color: var(--accent); color: #0f0e17; }
    .sub-btn.off { background: transparent; border-color: rgba(255,255,255,0.2); color: var(--muted); }

    /* ═══════════════════════════════════
       SCREEN 4 — VIDEO PLAYER
    ═══════════════════════════════════ */
    #screen-player { background: black; overflow: hidden; }

    #player-wrap {
      position: absolute; inset: 0;
    }
    #player-wrap iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    #player-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: black; color: var(--muted); font-size: 15px;
      z-index: 5;
    }
    #player-loading.hidden { display: none; }

    #player-tap {
      position: absolute; inset: 0;
      z-index: 10;
      background: transparent;
    }

    #player-top {
      position: absolute; top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 0) 16px 48px;
      padding-top: max(16px, env(safe-area-inset-top, 16px));
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
      display: flex; align-items: center; gap: 12px;
      z-index: 20;
      transition: opacity 0.3s;
    }
    #player-top.hidden { opacity: 0; pointer-events: none; }

    .player-stop-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      color: white; font-size: 14px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; z-index: 21;
    }
    #player-video-title {
      flex: 1; font-size: 13px; color: rgba(255,255,255,0.85);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    #player-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 48px 20px max(20px, env(safe-area-inset-bottom, 20px));
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      z-index: 20;
      transition: opacity 0.3s;
    }
    #player-bottom.hidden { opacity: 0; pointer-events: none; }

    #player-dots {
      display: flex; gap: 7px; align-items: center;
      max-width: 100%; overflow-x: auto;
      padding: 4px 0;
      scrollbar-width: none;
    }
    #player-dots::-webkit-scrollbar { display: none; }
    .player-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      flex-shrink: 0; cursor: pointer;
      transition: all 0.2s;
    }
    .player-dot.active {
      width: 22px; height: 8px; border-radius: 4px;
      background: var(--accent);
    }
    .player-dot.watched {
      background: rgba(255,255,255,0.55);
    }

    .player-nav-row {
      display: flex; align-items: center; gap: 20px;
    }
    .player-nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
      color: white; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
      z-index: 21;
    }
    .player-nav-btn:active { background: rgba(255,255,255,0.28); }
    .player-counter {
      font-size: 13px; color: rgba(255,255,255,0.6);
      min-width: 54px; text-align: center;
    }

    /* ═══════════════════════════════════
       SCREEN 5 — ADMIN PIN
    ═══════════════════════════════════ */
    #screen-admin-pin {
      align-items: center; justify-content: center;
      background: var(--bg); padding: 24px;
    }
    .pin-card {
      background: var(--card); border-radius: 24px;
      padding: 36px 28px 28px; width: 100%; max-width: 340px; text-align: center;
    }
    .pin-lock { font-size: 40px; margin-bottom: 12px; }
    .pin-card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .pin-card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.15s, transform 0.15s;
    }
    .pin-dot.filled { background: var(--accent); transform: scale(1.15); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .pin-key {
      padding: 16px; background: var(--bg2); border: none; border-radius: 14px;
      color: var(--text); font-size: 20px; font-weight: 600;
      cursor: pointer; transition: background 0.12s, transform 0.1s;
    }
    .pin-key:active { background: #3a3860; transform: scale(0.93); }
    .pin-key.del { font-size: 16px; color: var(--muted); }
    .pin-error { color: #ff5c5c; font-size: 13px; margin-top: 14px; min-height: 18px; }
    .pin-cancel { margin-top: 16px; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 8px; }

    /* ═══════════════════════════════════
       SCREEN 6 — ADMIN DASHBOARD
    ═══════════════════════════════════ */
    #screen-admin { background: var(--bg); }
    .admin-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .admin-badge {
      background: var(--accent); color: #0f0e17;
      font-size: 11px; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
    }
    .admin-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .tab-btn {
      flex: 1; padding: 13px 8px; background: none; border: none;
      color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; padding: 20px; }
    .tab-pane.active { display: block; }

    .form-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 11px 14px; background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      color: var(--text); font-size: 16px; margin-bottom: 14px;
      -webkit-appearance: none;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .btn-primary {
      padding: 12px 24px; background: var(--accent);
      border: none; border-radius: 12px;
      color: #0f0e17; font-size: 15px; font-weight: 800; cursor: pointer;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-danger {
      padding: 8px 14px; background: none;
      border: 1px solid rgba(255,80,80,0.4); border-radius: 100px;
      color: #ff6b6b; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .card-block { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
    }

    .admin-profiles-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .admin-profile-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; background: var(--card); border-radius: var(--radius);
    }
    .admin-profile-info { flex: 1; }
    .admin-profile-name { font-size: 15px; font-weight: 700; }
    .admin-profile-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .color-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .color-swatch {
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .color-swatch.sel { border-color: white; transform: scale(1.15); }

    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-row {
      display: flex; gap: 12px; align-items: center;
      padding: 11px 12px; background: var(--card); border-radius: 14px;
    }
    .history-thumb { width: 72px; height: 40px; border-radius: 7px; object-fit: cover; background: var(--bg2); flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .settings-card { background: var(--card); border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { flex: 1; font-size: 14px; }
    .settings-input {
      padding: 8px 12px; background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: var(--text); font-size: 13px; text-align: right; width: 180px;
    }
    .settings-input:focus { outline: none; border-color: var(--accent); }
    .settings-select {
      padding: 8px 12px; background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: var(--text); font-size: 13px; width: 180px;
      -webkit-appearance: none; appearance: none;
    }
    .channel-edit-row { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .channel-edit-row:last-child { border-bottom: none; }
    .channel-edit-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .channel-id-input {
      width: 100%; padding: 8px 12px; background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: var(--text); font-size: 11px;
      font-family: 'SF Mono','Courier New',monospace;
    }
    .channel-id-input:focus { outline: none; border-color: var(--accent); }
    .settings-save-btn {
      margin-top: 8px; padding: 11px 22px; background: var(--accent);
      border: none; border-radius: 10px; color: #0f0e17;
      font-size: 14px; font-weight: 800; cursor: pointer;
    }
    .cat-section-header {
      font-size: 12px; font-weight: 700; color: var(--accent);
      padding: 12px 0 6px; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .device-lock-status {
      padding: 12px 16px; background: rgba(232,184,75,0.1);
      border: 1px solid rgba(232,184,75,0.3); border-radius: 12px;
      font-size: 14px; margin-bottom: 10px;
    }
  </style>
</head>
<body>

<!-- SCREEN 1: KID HOME — categories grid, no profiles visible -->
<div id="screen-kid-home" class="screen active">
  <div class="kid-header">
    <!-- Title tapped 5× fast = secret parent access -->
    <div class="kid-greeting" id="secret-tap-target">📺 <em>KidsTV</em></div>
  </div>
  <div class="scroll-body">
    <div class="kid-home-scroll" id="kid-home-body"></div>
  </div>
</div>

<!-- SCREEN 4: VIDEO PLAYER -->
<div id="screen-player" class="screen">
  <div id="player-wrap"></div>

  <div id="player-loading">
    <div class="spinner"></div>
    <div>Loading videos…</div>
  </div>

  <div id="player-tap"></div>

  <div id="player-top">
    <button class="player-stop-btn" onclick="stopPlayer()">⬅ Stop</button>
    <div id="player-video-title"></div>
  </div>

  <div id="player-bottom">
    <div id="player-dots"></div>
    <div class="player-nav-row">
      <button class="player-nav-btn" onclick="prevVideo()">◀ Prev</button>
      <div class="player-counter" id="player-counter"></div>
      <button class="player-nav-btn" onclick="nextVideo()">Next ▶</button>
    </div>
  </div>
</div>

<!-- SCREEN 5: ADMIN PIN -->
<div id="screen-admin-pin" class="screen">
  <div class="pin-card">
    <div class="pin-lock">🔒</div>
    <div class="pin-card-title">Parent Area</div>
    <div class="pin-card-sub">Enter your PIN to continue</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinTap('1')">1</button>
      <button class="pin-key" onclick="pinTap('2')">2</button>
      <button class="pin-key" onclick="pinTap('3')">3</button>
      <button class="pin-key" onclick="pinTap('4')">4</button>
      <button class="pin-key" onclick="pinTap('5')">5</button>
      <button class="pin-key" onclick="pinTap('6')">6</button>
      <button class="pin-key" onclick="pinTap('7')">7</button>
      <button class="pin-key" onclick="pinTap('8')">8</button>
      <button class="pin-key" onclick="pinTap('9')">9</button>
      <button class="pin-key" style="visibility:hidden"></button>
      <button class="pin-key" onclick="pinTap('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="pin-cancel" id="pin-cancel-btn">Cancel</button>
  </div>
</div>

<!-- SCREEN 6: ADMIN DASHBOARD -->
<div id="screen-admin" class="screen">
  <div class="admin-header">
    <button class="btn-icon" onclick="exitAdmin()">⬅</button>
    <div class="screen-title">Parent Area</div>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('profiles')">Categories</button>
    <button class="tab-btn" onclick="switchTab('history')">History</button>
    <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
  </div>
  <div class="scroll-body">
    <div id="tab-profiles" class="tab-pane active">
      <div class="admin-profiles-list" id="admin-profiles-list"></div>
    </div>

};

const getHistory   = () => store.get('ktv_history', []);

function getConfig() {
  return Object.assign({}, DEFAULT_CONFIG, store.get('ktv_config', {}));

function saveConfig(c) { store.set('ktv_config', c); }

function getCategories() {
  const stored = store.get('ktv_categories', null);
  if (!stored) return DEFAULT_CATEGORIES;
  return DEFAULT_CATEGORIES.map(def => {
    const s = stored.find(x => x.id === def.id);
    if (!s) return def;
    return { ...def, channels: def.channels.map((ch, i) => ({ ...ch, id: (s.channels[i]?.id) || ch.id })) };
  });
}
function saveCategories(c) { store.set('ktv_categories', c); }

function logHistory(profileName, video) {
  const h = getHistory();
  h.unshift({ profileName, videoId: video.videoId, videoTitle: video.title, channelName: video.channelName, thumb: video.thumb, watchedAt: Date.now() });

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════

const NAV_STACK = [];

function _setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    const sb = el.querySelector('.scroll-body');
    if (sb) sb.scrollTop = 0;
  }
}

function showScreen(id) {
  const curr = document.querySelector('.screen.active')?.id;
  if (curr && curr !== id) NAV_STACK.push(curr);
  _setScreen(id);
}

function goBack() {
  const curr = document.querySelector('.screen.active')?.id;
  if (curr === 'screen-player') { _stopPlayer(); return; }
  if (NAV_STACK.length > 0) {
    const prev = NAV_STACK.pop();
    _setScreen(prev);
    if (prev === 'screen-kid-home') renderKidHome();
  } else {
    renderKidHome();
    _setScreen('screen-kid-home');
  }
}

window.addEventListener('popstate', () => {

  history.pushState({ kidstv: 1 }, '');
});

function renderProfiles() {

function renderExplore() {
  const subs = S.profile?.subscriptions || [];
  const list = document.getElementById('explore-list');
  list.innerHTML = '';
  getCategories().forEach(cat => {
    const on = subs.includes(cat.id);
    const row = document.createElement('div');
    row.className = 'explore-row';
    row.innerHTML = `
      <div class="explore-icon" style="background:${hexA(cat.color,0.2)}">${cat.emoji}</div>
      <div class="explore-info">
        <div class="explore-name">${esc(cat.name)}</div>
        <div class="explore-channels">${esc(cat.channels.map(c => c.name).join(', '))}</div>
      </div>
      <button class="sub-btn ${on ? 'on' : 'off'}">${on ? '✓ Subscribed' : '+ Subscribe'}</button>
    `;
    row.querySelector('.sub-btn').addEventListener('click', () => toggleSub(cat.id));
    list.appendChild(row);
  });
}

function toggleSub(catId) {
  if (!S.profile) return;
  const profiles = getProfiles();
  const idx = profiles.findIndex(p => p.id === S.profile.id);
  if (idx < 0) return;
  const subs = profiles[idx].subscriptions || [];
  const pos = subs.indexOf(catId);
  if (pos < 0) subs.push(catId); else subs.splice(pos, 1);
  profiles[idx].subscriptions = subs;
  saveProfiles(profiles);
  S.profile = profiles[idx];
  renderExplore();
}

// ═══════════════════════════════════════════════════════
// SCREEN 4 — AUTO-PLAY VIDEO PLAYER
// ═══════════════════════════════════════════════════════

async function openCategory(cat) {
  S.currentCatId = cat.id;
  S.watchedSet = new Set();
  showScreen('screen-player');

  const loadEl = document.getElementById('player-loading');
  loadEl.innerHTML = `<div class="spinner"></div><div>Loading ${esc(cat.name)}…</div>`;
  loadEl.classList.remove('hidden');
  document.getElementById('player-wrap').innerHTML = '';

  // Check in-memory cache
  const cached = S.videoCache[cat.id];
  if (cached && Date.now() - cached.ts < S.CACHE_TTL) {
    startPlaylist(cached.videos, 0);
    return;
  }

  const { apiKey } = getConfig();
  const results = await Promise.allSettled(cat.channels.map(ch => fetchChannel(ch, apiKey)));
  const videos = [];
  results.forEach(r => { if (r.status === 'fulfilled') videos.push(...r.value); });

  if (!videos.length) {
    loadEl.innerHTML = `<div style="font-size:48px">😔</div>
      <div style="font-size:18px;font-weight:700;margin-top:8px;">No videos found</div>
      <div style="font-size:14px;color:var(--muted);margin-top:8px;">Ask a parent to check Settings.</div>
      <button class="player-stop-btn" style="margin-top:20px;" onclick="stopPlayer()">← Go Back</button>`;
    return;
  }

  const shuffled = shuffle(videos);
  S.videoCache[cat.id] = { videos: shuffled, ts: Date.now() };
  startPlaylist(shuffled, 0);
}

async function fetchChannel(channel, apiKey) {
  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${encodeURIComponent(channel.id)}&maxResults=50&order=date&type=video&safeSearch=strict&videoEmbeddable=true&key=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return (data.items || []).map(item => ({
    videoId: item.id.videoId,
    title: item.snippet.title,
    channelName: item.snippet.channelTitle,
    thumb: (item.snippet.thumbnails?.medium || item.snippet.thumbnails?.default || {}).url || '',
  })).filter(v => v.videoId);
}

function startPlaylist(videos, idx) {
  S.videos = videos;
  S.videoIdx = idx;
  playVideo(idx);
}

function playVideo(idx) {
  S.videoIdx = idx;
  S.watchedSet.add(idx);
  const video = S.videos[idx];
  if (!video) return;

  document.getElementById('player-video-title').textContent = video.title;
  document.getElementById('player-counter').textContent = `${idx + 1} / ${S.videos.length}`;

  // youtube-nocookie.com reduces tracking-based ads
  document.getElementById('player-wrap').innerHTML = `<iframe
    src="https://www.youtube-nocookie.com/embed/${encodeURIComponent(video.videoId)}?autoplay=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
  ></iframe>`;

  document.getElementById('player-loading').classList.add('hidden');

  // Build dots — cap at 50, show pill for active, filled for watched
  const dotsEl = document.getElementById('player-dots');
  dotsEl.innerHTML = '';
  const max = Math.min(S.videos.length, 50);
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    const isActive = i === idx;
    const isWatched = S.watchedSet.has(i) && !isActive;
    d.className = 'player-dot' + (isActive ? ' active' : '') + (isWatched ? ' watched' : '');
    d.title = S.videos[i].title;
    const captured = i;
    d.addEventListener('click', e => { e.stopPropagation(); playVideo(captured); });
    dotsEl.appendChild(d);
  }
  // Scroll active dot into view
  if (dotsEl.children[idx]) {
    dotsEl.children[idx].scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }

  if (S.profile) logHistory(S.profile.name, video);

  // Reset tap overlay to active state before showing controls
  document.getElementById('player-tap').style.pointerEvents = 'all';
  showControls();
}

function nextVideo() {
  playVideo((S.videoIdx + 1) % S.videos.length);
}
function prevVideo() {
  playVideo((S.videoIdx - 1 + S.videos.length) % S.videos.length);
}

// Internal stop — doesn't push to nav stack
function _stopPlayer() {
  clearTimeout(S.controlsTimer);
  document.getElementById('player-wrap').innerHTML = '';
  // Remove any player entries from the nav stack
  while (NAV_STACK.includes('screen-player')) {
    NAV_STACK.splice(NAV_STACK.indexOf('screen-player'), 1);
  }
  renderKidHome();
  _setScreen('screen-kid-home');
}

// Public stop (called from button onclick)
function stopPlayer() { _stopPlayer(); }

function showControls() {
  clearTimeout(S.controlsTimer);
  document.getElementById('player-top').classList.remove('hidden');
  document.getElementById('player-bottom').classList.remove('hidden');
  // Let taps pass through to YouTube so the user can pause/play
  document.getElementById('player-tap').style.pointerEvents = 'none';
  S.controlsTimer = setTimeout(hideControls, 4500);
}

function hideControls() {
  document.getElementById('player-top').classList.add('hidden');
  document.getElementById('player-bottom').classList.add('hidden');
  // Re-enable tap overlay so next tap brings controls back
  document.getElementById('player-tap').style.pointerEvents = 'all';
}

// Tap overlay only fires when controls are hidden (pointer-events: all)
// When controls are visible, taps go straight through to YouTube for pause/play
document.getElementById('player-tap').addEventListener('click', () => {
  showControls();
});

function goAdminPin() {
  S.pinEntry = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';

    NAV_STACK.length = 0;
    renderKidHome();
    _setScreen('screen-kid-home');
  };
  showScreen('screen-admin-pin');
}

function pinTap(d) {
  if (S.pinEntry.length >= 4) return;
  S.pinEntry += d;
  updatePinDots();
  if (S.pinEntry.length === 4) setTimeout(checkPin, 150);
}
function pinDel() {
  S.pinEntry = S.pinEntry.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}
function updatePinDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('dot-' + i).classList.toggle('filled', i < S.pinEntry.length);
}
function checkPin() {
  if (S.pinEntry === getConfig().adminPin) {
    S.pinEntry = '';
    updatePinDots();
    // Replace pin screen in stack with admin
    if (NAV_STACK[NAV_STACK.length - 1] !== 'screen-admin-pin') {
      // pop pin from stack so back from admin goes to correct place
    }
    openAdmin();
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN — try again';
    S.pinEntry = '';
    updatePinDots();
    const dots = document.getElementById('pin-dots');
    dots.style.animation = 'none';
    void dots.offsetHeight;
    dots.style.animation = 'shake 0.3s ease';
  }
}

function switchTab(name) {

    b.classList.toggle('active', ['profiles','history','settings'][i] === name);
  });
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'profiles') renderAdminProfiles();
  else if (name === 'history') renderAdminHistory();
  else if (name === 'settings') renderAdminSettings();
}

      <button class="sub-btn ${isEnabled ? 'on' : 'off'}" style="flex-shrink:0;">${isEnabled ? '✓ On' : 'Off'}</button>
    `;
    row.querySelector('.sub-btn').addEventListener('click', () => toggleCat(cat.id));
    list.appendChild(row);
  });
}

function toggleCat(catId) {
  const disabled = store.get('ktv_disabled_cats', []);
  const idx = disabled.indexOf(catId);
  if (idx >= 0) disabled.splice(idx, 1); else disabled.push(catId);
  store.set('ktv_disabled_cats', disabled);
  S.videoCache = {};
  renderAdminProfiles();
}

// ── History ──
function renderAdminHistory() {
  const history = getHistory();
  const el = document.getElementById('history-content');
  if (!history.length) {
    el.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--muted);"><div style="font-size:48px;margin-bottom:12px;">📺</div><p>No watch history yet.</p></div>`;
    return;
  }
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div style="font-size:14px;color:var(--muted);">${history.length} videos watched</div>
      <button class="btn-danger" id="clear-hist-btn">Clear All</button>
    </div>
    <div class="history-list" id="hist-list"></div>
  `;
  document.getElementById('clear-hist-btn').addEventListener('click', () => {
    if (confirm('Clear all watch history?')) { saveHistory([]); renderAdminHistory(); }
  });
  const list = document.getElementById('hist-list');
  history.forEach(item => {
    const d = new Date(item.watchedAt);
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `
      ${item.thumb ? `<img class="history-thumb" src="${esc(item.thumb)}" alt="" loading="lazy">` : `<div class="history-thumb"></div>`}
      <div class="history-info">
        <div class="history-title">${esc(item.videoTitle || 'Unknown')}</div>
        <div class="history-meta">${esc(item.profileName)} · ${esc(item.channelName || '')} · ${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ── Settings ──
function renderAdminSettings() {
  document.getElementById('settings-pin').value = '';
  document.getElementById('settings-apikey').value = '';

  const cats = getCategories();
  const csList = document.getElementById('channel-settings-list');
  csList.innerHTML = '';
  cats.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-section-header';
    header.textContent = cat.emoji + ' ' + cat.name;
    csList.appendChild(header);
    const card = document.createElement('div');
    card.className = 'settings-card';
    card.style.marginBottom = '10px';
    cat.channels.forEach((ch, i) => {
      const row = document.createElement('div');
      row.className = 'channel-edit-row';
      row.innerHTML = `<div class="channel-edit-label">${esc(ch.name)}</div><input class="channel-id-input" data-catid="${cat.id}" data-chi="${i}" value="${esc(ch.id)}" placeholder="YouTube Channel ID" />`;
      card.appendChild(row);
    });
    csList.appendChild(card);
  });
}

function saveAppSettings() {
  const cfg = getConfig();
  const pin = document.getElementById('settings-pin').value.trim();
  const api = document.getElementById('settings-apikey').value.trim();
  if (pin) cfg.adminPin = pin;
  if (api) cfg.apiKey = api;
  saveConfig(cfg);
  S.videoCache = {};
  alert('✅ Saved!');
  renderAdminSettings();
}

function saveChannelSettings() {
  const cats = getCategories();
  document.querySelectorAll('.channel-id-input').forEach(inp => {
    const cat = cats.find(c => c.id === inp.dataset.catid);
    if (cat) cat.channels[+inp.dataset.chi].id = inp.value.trim();
  });
  saveCategories(cats);
  S.videoCache = {};
  alert('✅ Channel IDs saved!');
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function hexA(hex, alpha) {
  try {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  } catch { return `rgba(100,100,200,${alpha})`; }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
