<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KidsTV">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>KidsTV</title>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    :root {
      --bg: #0c0b14;
      --bg2: #161524;
      --card: #1e1d2e;
      --card2: #272638;
      --text: #fffffe;
      --muted: #8b8fa8;
      --accent: #e8b84b;
      --radius: 20px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SCREEN SYSTEM ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── SHARED COMPONENTS ── */
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--card2);
      border: none;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }
    .btn-icon:active { background: #3a3860; }

    /* ════════════════════════════════════════
       SCREEN: HOME
    ════════════════════════════════════════ */
    #screen-home {
      background: var(--bg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
      flex-shrink: 0;
    }

    .home-logo {
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .time-pill {
      font-size: 13px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      transition: background 0.3s, color 0.3s;
    }
    .time-pill.warn { background: rgba(255,160,0,0.2); color: #ffb830; }
    .time-pill.danger { background: rgba(255,60,60,0.2); color: #ff6060; }

    .home-body {
      flex: 1;
      padding: 18px 18px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Category grid */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (min-width: 560px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }

    /* Each card has embedded SVG art */
    .cat-card {
      position: relative;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .cat-card:active { transform: scale(0.91); }

    .cat-card svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Gradient overlay at bottom so name text is readable */
    .cat-card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 10px 13px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0) 100%);
    }
    .cat-card-name {
      font-size: clamp(13px, 2.8vw, 17px);
      font-weight: 800;
      color: #fff;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
      line-height: 1.2;
    }

    /* ════════════════════════════════════════
       SCREEN: PLAYER
    ════════════════════════════════════════ */
    #screen-player {
      background: #000;
      overflow: hidden;
    }

    /* YT iframe container fills entire screen */
    #player-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    /* Force iframe to fill no matter what YT sets */
    #player-wrap iframe,
    #yt-player-el,
    #yt-player-el iframe {
      position: absolute !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border: none !important;
    }

    /* Loading overlay */
    #player-loading {
      position: absolute;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      z-index: 30;
      transition: opacity 0.3s;
    }
    #player-loading.hidden { opacity: 0; pointer-events: none; }

    /*
      TAP ZONE: covers the top 78%.
      The bottom 22% is overlay-free so YouTube's
      "Skip Ad" button is ALWAYS tappable directly.
    */
    #player-tap-zone {
      position: absolute;
      top: 0; left: 0; right: 0;
      bottom: 22%;
      z-index: 10;
      cursor: pointer;
    }

    /* Center controls — appear on tap, fade out after 3.5s */
    #player-controls {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 80px;
      padding: 16px 32px;
      pointer-events: all;
      transition: opacity 0.25s;
    }
    #player-controls.hidden { opacity: 0; pointer-events: none; }

    .ctrl-btn {
      width: 62px; height: 62px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.22);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .ctrl-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.22); }
    .ctrl-btn.primary {
      width: 80px; height: 80px;
      font-size: 28px;
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.38);
    }

    /* Category label fade-in at top */
    /* Persistent home button — always in top-left */
    #player-home-btn {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 20;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 100px;
      color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.3s;
    }
    #player-home-btn:active { background: rgba(255,255,255,0.2); }
    /* Fade it out slightly during playback so it's unobtrusive */
    #player-home-btn.dim { opacity: 0.25; }

    #player-cat-label {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      color: rgba(255,255,255,0.9);
      font-size: 13px; font-weight: 600;
      padding: 7px 18px;
      border-radius: 100px;
      pointer-events: none;
      z-index: 15;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #player-cat-label.show { opacity: 1; }

    /* Dots — bottom of screen. pointer-events:none so skip-ad button still works */
    #player-dots {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      align-items: center;
      pointer-events: none;
      z-index: 15;
    }
    .pdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .pdot.active { background: #fff; width: 22px; border-radius: 4px; }
    .pdot.near { background: rgba(255,255,255,0.55); }

    /* Time warning banner — slides down from top */
    #time-banner {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
      transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #time-banner.show { top: 20px; }
    #time-banner.yellow { background: rgba(255,180,0,0.9); color: #1a0a00; }
    #time-banner.orange { background: rgba(255,100,0,0.9); color: #fff; }
    #time-banner.red    { background: rgba(220,30,30,0.95); color: #fff; }

    /* ════════════════════════════════════════
       SCREEN: TIME UP
    ════════════════════════════════════════ */
    #screen-timeup {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
      gap: 0;
    }

    .timeup-emoji { font-size: 72px; margin-bottom: 24px; animation: wobble 2s ease infinite; }
    @keyframes wobble {
      0%,100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .timeup-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
    .timeup-sub { font-size: 17px; color: var(--muted); line-height: 1.5; margin-bottom: 48px; }

    .timeup-override {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      color: var(--muted);
      font-size: 13px;
      padding: 10px 22px;
      cursor: pointer;
    }

    /* Time extension options */
    .extend-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      margin-top: 32px;
    }
    .extend-btn {
      padding: 16px;
      background: var(--card);
      border: none;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px; font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .extend-btn:active { background: var(--card2); }
    .extend-btn.primary { background: var(--accent); color: #0f0e17; }

    /* ════════════════════════════════════════
       SCREEN: ADMIN PIN
    ════════════════════════════════════════ */
    #screen-admin-pin {
      background: var(--bg);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .pin-card {
      background: var(--card);
      border-radius: 24px;
      padding: 36px 28px 28px;
      width: 100%; max-width: 340px;
      text-align: center;
    }
    .pin-lock { font-size: 40px; margin-bottom: 12px; }
    .pin-card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .pin-card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
    .pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.15s, transform 0.15s;
    }
    .pin-dot.filled { background: var(--accent); transform: scale(1.15); }

    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      padding: 16px;
      background: var(--bg2); border: none; border-radius: 14px;
      color: var(--text);
      font-size: 20px; font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
    }
    .pin-key:active { background: #3a3860; transform: scale(0.93); }
    .pin-key.del { font-size: 16px; color: var(--muted); }

    .pin-error { color: #ff5c5c; font-size: 13px; margin-top: 14px; min-height: 18px; }
    .pin-cancel {
      margin-top: 16px;
      background: none; border: none;
      color: var(--muted); font-size: 14px;
      cursor: pointer; padding: 8px;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* ════════════════════════════════════════
       SCREEN: ADMIN DASHBOARD
    ════════════════════════════════════════ */
    #screen-admin { background: var(--bg); }

    .admin-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .admin-title { font-size: 20px; font-weight: 700; flex: 1; }
    .admin-badge {
      background: var(--accent); color: #0f0e17;
      font-size: 11px; font-weight: 800;
      padding: 3px 9px; border-radius: 100px;
    }

    .admin-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; padding: 13px 6px;
      background: none; border: none;
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-pane { display: none; padding: 20px; overflow-y: auto; flex: 1; }
    .tab-pane.active { display: block; }

    /* History tab */
    .history-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .history-count { font-size: 14px; color: var(--muted); }
    .btn-clear {
      padding: 8px 16px; background: none;
      border: 1px solid rgba(255,80,80,0.4);
      border-radius: 100px; color: #ff6b6b;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-row {
      display: flex; gap: 12px; align-items: center;
      padding: 11px 12px;
      background: var(--card); border-radius: 14px;
    }
    .history-thumb {
      width: 72px; height: 40px;
      border-radius: 7px; object-fit: cover;
      background: var(--bg2); flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .em { font-size: 48px; margin-bottom: 12px; }

    /* Categories tab */
    .cat-toggle-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--card); border-radius: var(--radius);
      margin-bottom: 10px;
    }
    .cat-toggle-art {
      width: 52px; height: 52px;
      border-radius: 12px;
      overflow: hidden; flex-shrink: 0;
    }
    .cat-toggle-art svg { width: 100%; height: 100%; display: block; }
    .cat-toggle-info { flex: 1; min-width: 0; }
    .cat-toggle-name { font-size: 15px; font-weight: 700; }
    .cat-toggle-channels { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Toggle switch */
    .toggle-wrap { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
    .toggle-input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--card2);
      border-radius: 100px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #fff;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle-input:checked + .toggle-slider { background: var(--accent); }
    .toggle-input:checked + .toggle-slider::after { transform: translateX(22px); }

    /* Settings tab */
    .settings-section { margin-bottom: 24px; }
    .settings-section-title {
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.4px;
      color: var(--muted); margin-bottom: 10px;
    }
    .settings-card { background: var(--card); border-radius: var(--radius); overflow: hidden; }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-label { flex: 1; font-size: 14px; }
    .settings-label small { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
    .settings-input {
      padding: 8px 12px; background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: var(--text);
      font-size: 13px; text-align: right; width: 160px;
    }
    .settings-input:focus { outline: none; border-color: var(--accent); }
    .settings-input-wide { width: 100%; text-align: left; }

    .channel-edit-section { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .channel-edit-section:last-child { border-bottom: none; }
    .channel-edit-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .channel-id-input {
      width: 100%; padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: var(--text);
      font-size: 11px;
      font-family: 'SF Mono','Courier New',monospace;
    }
    .channel-id-input:focus { outline: none; border-color: var(--accent); }

    .cat-channel-header {
      font-size: 12px; font-weight: 800;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 10px 0 4px;
    }

    .save-btn {
      margin-top: 8px; padding: 12px 24px;
      background: var(--accent); border: none; border-radius: 12px;
      color: #0f0e17; font-size: 14px; font-weight: 800;
      cursor: pointer;
    }
    .save-btn:active { opacity: 0.8; }

    /* ════════════════════════════════════════
       CATEGORY MULTI-SELECT
    ════════════════════════════════════════ */
    /* Tap a card to select/deselect it */
    .cat-card.selected {
      box-shadow: 0 0 0 3px var(--accent), 0 0 24px rgba(232,184,75,0.25);
    }
    .cat-check {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900;
      color: #0f0e17;
      z-index: 5;
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 0.18s ease, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    .cat-card.selected .cat-check {
      opacity: 1;
      transform: scale(1);
    }
    /* Dim unselected cards when something is selected */
    .cat-grid.has-selection .cat-card:not(.selected) {
      opacity: 0.55;
    }

    /* Floating Play button — slides up from bottom-right when ≥1 category selected */
    #play-fab {
      position: fixed;
      bottom: 28px; right: 24px;
      transform: translateY(160px);
      z-index: 60;
      background: var(--accent);
      color: #0f0e17;
      border: none;
      border-radius: 100px;
      font-size: 17px; font-weight: 900;
      padding: 16px 32px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(232,184,75,0.5);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      letter-spacing: 0.2px;
    }
    #play-fab.show {
      transform: translateY(0);
    }
    #play-fab:active {
      box-shadow: 0 3px 12px rgba(232,184,75,0.3);
      transform: scale(0.95);
    }

    /* Extra bottom padding on home so last card isn't hidden by FAB */
    .home-body { padding-bottom: 110px; }
  </style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-logo">📺 KidsTV</div>
    <div class="time-pill" id="time-pill">Loading…</div>
  </div>
  <div class="home-body">
    <div class="section-label">Pick what to watch — tap to select!</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</div>

<!-- Floating Play button — bottom-right corner, slides up when categories selected -->
<button id="play-fab" onclick="startSelectedCategories()">▶  Play</button>

<!-- ══ PLAYER ══ -->
<div id="screen-player" class="screen">
  <div id="player-wrap"></div>

  <div id="player-loading">
    <div class="spinner"></div>
    <div id="player-loading-text">Loading…</div>
  </div>

  <!-- Tap zone: top 78%. Bottom 22% always open for Skip Ad. -->
  <div id="player-tap-zone"></div>

  <!-- Home button — always visible top-left corner -->
  <button id="player-home-btn" onclick="closePlayer()">⬅ Categories</button>

  <!-- Center controls -->

  timeLimitMinutes: 60,

function getConfig() {
  try { return Object.assign({}, DEFAULT_CONFIG, JSON.parse(localStorage.getItem('ktv_config')) || {}); }
  catch { return { ...DEFAULT_CONFIG }; }
}
function saveConfig(c) { localStorage.setItem('ktv_config', JSON.stringify(c)); }

function getHistory() {
  try { return JSON.parse(localStorage.getItem('ktv_history')) || []; }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('ktv_history', JSON.stringify(h)); }

/* Category visibility — stored separately from DEFAULT_CATEGORIES */
function getCatVisibility() {
  try { return JSON.parse(localStorage.getItem('ktv_cat_vis')) || {}; }
  catch { return {}; }
}
function saveCatVisibility(v) { localStorage.setItem('ktv_cat_vis', JSON.stringify(v)); }

/* Channel ID overrides (set from admin settings) */
function getChannelOverrides() {
  try { return JSON.parse(localStorage.getItem('ktv_ch_overrides')) || {}; }
  catch { return {}; }
}
function saveChannelOverrides(o) { localStorage.setItem('ktv_ch_overrides', JSON.stringify(o)); }

/* Returns categories with visibility + channel ID overrides applied */
function getCategories() {
  const vis = getCatVisibility();
  const overrides = getChannelOverrides();
  return DEFAULT_CATEGORIES
    .filter(c => vis[c.id] !== false)
    .map(c => ({
      ...c,
      channels: c.channels.map((ch, i) => ({
        ...ch,
        id: (overrides[c.id] && overrides[c.id][i]) || ch.id,
      }))
    }));
}

/* Daily time tracking */
function getTodayKey() {
  return 'ktv_time_' + new Date().toISOString().slice(0, 10);
}
function getUsedSeconds() {
  return parseInt(localStorage.getItem(getTodayKey())) || 0;
}
function addUsedSeconds(n) {
  localStorage.setItem(getTodayKey(), getUsedSeconds() + n);
}
function getRemainingSeconds() {
  const cfg = getConfig();
  if (cfg.timeLimitMinutes >= 999) return Infinity;
  return Math.max(0, cfg.timeLimitMinutes * 60 - getUsedSeconds());
}

function addToHistory(video) {
  const h = getHistory();
  h.unshift({
    videoId: video.videoId,
    title:   video.title,
    channel: video.channelName,
    thumb:   video.thumb,
    watchedAt: Date.now(),
  });
  saveHistory(h.slice(0, 300));
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

const state = {
  currentScreen:    'screen-home',
  currentCatId:     null,
  currentVideos:    [],
  currentIndex:     0,
  windDownVideos:   [],
  windDownMode:     false,
  isPlaying:        true,
  ytReady:          false,
  pendingVideoId:   null,
  timeInterval:     null,
  controlsTimer:    null,
  warningsShown:    new Set(),
  pinEntry:         '',
  pinAction:        'admin',   // 'admin' | 'extend'
  fetchingMore:     false,
  gracePeriod:      false,     // true = let current video finish even after time's up
  selectedCatIds:   new Set(), // resets every time user returns to home
};

// ═══════════════════════════════════════════════════════════
// TRIPLE-TAP TOP-RIGHT → ADMIN PIN
// Detects 3 taps within 700ms in the top-right 90×90px zone
// ═══════════════════════════════════════════════════════════

let _cornerTaps = 0, _cornerTimer = null;

document.addEventListener('pointerup', e => {
  if (e.clientX > window.innerWidth - 90 && e.clientY < 90) {
    _cornerTaps++;
    clearTimeout(_cornerTimer);
    if (_cornerTaps >= 3) {
      _cornerTaps = 0;
      goAdminPin('admin');
    } else {
      _cornerTimer = setTimeout(() => { _cornerTaps = 0; }, 700);
    }
  }
}, { passive: true });

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  state.currentScreen = id;
}

// ═══════════════════════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════════════════════

function renderHome() {
  const cats = getCategories();
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';

  cats.forEach(cat => {
    const isSelected = state.selectedCatIds.has(cat.id);
    const card = document.createElement('div');
    card.className = 'cat-card' + (isSelected ? ' selected' : '');
    card.dataset.catid = cat.id;
    card.innerHTML = `
      ${SVG[cat.svgKey] || ''}
      <div class="cat-check">✓</div>
      <div class="cat-card-overlay">
        <div class="cat-card-name">${esc(cat.name)}</div>
      </div>
    `;
    card.addEventListener('click', () => toggleCatSelection(cat.id));
    grid.appendChild(card);
  });

  updateTimePill();
  updatePlayFab();
}

function toggleCatSelection(catId) {
  if (state.selectedCatIds.has(catId)) {
    state.selectedCatIds.delete(catId);
  } else {
    state.selectedCatIds.add(catId);
  }
  // Update just this card's visual (no full re-render)
  const card = document.querySelector(`.cat-card[data-catid="${catId}"]`);
  if (card) card.classList.toggle('selected', state.selectedCatIds.has(catId));
  // Dim/undim unselected cards
  const grid = document.getElementById('cat-grid');
  grid.classList.toggle('has-selection', state.selectedCatIds.size > 0);
  updatePlayFab();
}

function updatePlayFab() {
  const fab  = document.getElementById('play-fab');
  const n    = state.selectedCatIds.size;
  if (n === 0) {
    fab.classList.remove('show');
    return;
  }
  fab.textContent = '▶  Play';
  fab.classList.add('show');
}

async function startSelectedCategories() {
  if (!state.selectedCatIds.size) return;
  const allCats = getCategories();
  const selected = allCats.filter(c => state.selectedCatIds.has(c.id));
  await openCategories(selected);
}

function updateTimePill() {
  const pill = document.getElementById('time-pill');
  const rem = getRemainingSeconds();
  if (rem === Infinity) {
    pill.textContent = '∞ time';
    pill.className = 'time-pill';
    return;
  }
  const m = Math.ceil(rem / 60);
  pill.textContent = `⏱ ${m} min left`;
  pill.className = 'time-pill' + (m <= 5 ? ' danger' : m <= 10 ? ' warn' : '');
}

// ═══════════════════════════════════════════════════════════
// CATEGORY → PLAYER
// Skip the grid entirely. Start loading, then stream.
// ═══════════════════════════════════════════════════════════

// Opens one OR multiple categories — merges & shuffles all their videos
async function openCategories(cats) {
  if (getRemainingSeconds() === 0) { showTimeUpScreen(); return; }

  const sessionKey = cats.map(c => c.id).sort().join(',');
  state.currentCatId  = sessionKey;
  state.currentVideos = [];
  state.currentIndex  = 0;
  state.windDownVideos= [];
  state.windDownMode  = false;
  state.warningsShown = new Set();
  state.gracePeriod   = false;
  state.fetchingMore  = false;

  document.getElementById('player-wrap').innerHTML = '';
  const loadLabel = cats.length === 1 ? cats[0].name : `${cats.length} categories…`;
  showPlayerLoading(loadLabel);
  document.getElementById('player-controls').classList.add('hidden');
  document.getElementById('player-dots').innerHTML = '';
  hideTimeBanner();
  const displayLabel = cats.length === 1 ? cats[0].name : cats.map(c => c.name).join(' · ');
  showCatLabel(displayLabel);
  showScreen('screen-player');

  const { apiKey } = getConfig();

  // Use cache where possible; only fetch uncached cats
  const allVideos   = [];
  const catsToFetch = [];

  cats.forEach(cat => {
    const cached = _videoCache[cat.id];
    if (cached && Date.now() - cached.ts < 3600000) {
      allVideos.push(...cached.videos);
    } else {
      catsToFetch.push(cat);
    }
  });

  if (!catsToFetch.length) {
    state.currentVideos = shuffleArray(allVideos);
    startPlayingCurrent();
    return;
  }

  try {
    // Flatten all channels from all uncached cats
    const allChannels = catsToFetch.flatMap(c => c.channels.map(ch => ({ ...ch, _catId: c.id })));
    const results = await Promise.allSettled(
      allChannels.map(ch => fetchChannelPage(ch.id, apiKey, null, null))
    );
    if (state.currentCatId !== sessionKey) return; // user navigated away

    // Group results back by category for caching
    const catVidMap = {};
    const nextTokens = {};
    results.forEach((r, i) => {
      const ch = allChannels[i];
      if (!catVidMap[ch._catId]) catVidMap[ch._catId] = [];
      if (r.status === 'fulfilled') {
        catVidMap[ch._catId].push(...r.value.videos);
        if (r.value.nextPageToken) nextTokens[ch.id] = r.value.nextPageToken;
      }
    });

    catsToFetch.forEach(cat => {
      const vids = catVidMap[cat.id] || [];
      _videoCache[cat.id] = { ts: Date.now(), videos: vids };
      allVideos.push(...vids);
    });

    if (!allVideos.length) {
      showPlayerError('No videos found. Check channel IDs in Parent Area → Settings.');
      return;
    }

    state.currentVideos = shuffleArray(allVideos);
    startPlayingCurrent();

    // Background-fetch more pages for all fetched cats
    catsToFetch.forEach(cat => {
      fetchMoreInBackground(cat, apiKey, nextTokens, 3);
    });
  } catch (err) {
    if (state.currentCatId !== sessionKey) return;
    showPlayerError(esc(err.message || 'Error loading videos'));
  }
}

const _videoCache = {};

async function fetchChannelPage(channelId, apiKey, pageToken, durationFilter) {
  // durationFilter: null (no filter), 'short' (<4min), 'medium' (4-20min)
  let url = 'https://www.googleapis.com/youtube/v3/search'
    + '?part=snippet'
    + '&channelId=' + encodeURIComponent(channelId)
    + '&maxResults=50'
    + '&order=date'
    + '&type=video'
    + '&safeSearch=strict'
    + '&videoEmbeddable=true'
    + '&key=' + encodeURIComponent(apiKey);
  if (durationFilter) url += '&videoDuration=' + durationFilter;
  if (pageToken)      url += '&pageToken=' + encodeURIComponent(pageToken);

  const res = await fetch(url);
  if (!res.ok) {
    let msg = 'YouTube API error ' + res.status;
    try { const d = await res.json(); if (d.error) msg = d.error.message; } catch {}
    throw new Error(msg);
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);

  // Filter out Shorts by title (channels like SciShow Kids often tag them)
  const SHORTS_RE = /(#shorts?|(?:^|\s)shorts?(?:\s|$))/i;

  const videos = (data.items || [])
    .filter(it => it.id && it.id.videoId)
    .map(it => ({
      videoId:     it.id.videoId,
      title:       it.snippet.title || '',
      channelName: it.snippet.channelTitle || '',
      thumb:       (it.snippet.thumbnails?.medium || it.snippet.thumbnails?.default || {}).url || '',
      publishedAt: it.snippet.publishedAt || '',
    }))
    .filter(v => !SHORTS_RE.test(v.title));

  return { videos, nextPageToken: data.nextPageToken || null };
}

async function fetchMoreInBackground(cat, apiKey, pageTokens, roundsLeft) {
  if (!roundsLeft || !Object.keys(pageTokens).length || state.fetchingMore) return;
  if (state.currentCatId !== cat.id) return;
  state.fetchingMore = true;
  try {
    const chIds = Object.keys(pageTokens);
    const results = await Promise.allSettled(
      chIds.map(id => fetchChannelPage(id, apiKey, pageTokens[id], null))
    );
    if (state.currentCatId !== cat.id) return;

    const newTokens = {};
    const newVids = [];
    results.forEach((r, i) => {
      if (r.status === 'fulfilled') {
        newVids.push(...r.value.videos);
        if (r.value.nextPageToken) newTokens[chIds[i]] = r.value.nextPageToken;
      }
    });

    if (newVids.length) {
      const existing = new Set(state.currentVideos.map(v => v.videoId));
      const unique   = shuffleArray(newVids.filter(v => !existing.has(v.videoId)));
      if (unique.length) {
        state.currentVideos.splice(state.currentIndex + 1, 0, ...unique);
        renderDots();
      }
    }
    state.fetchingMore = false;
    if (Object.keys(newTokens).length) {
      setTimeout(() => fetchMoreInBackground(cat, apiKey, newTokens, roundsLeft - 1), 600);
    } else {
      _videoCache[cat.id] = { videos: [...state.currentVideos], ts: Date.now() };
    }
  } catch { state.fetchingMore = false; }
}

// ═══════════════════════════════════════════════════════════
// YOUTUBE IFRAME API
// Uses youtube-nocookie.com for privacy + ad reduction.
// ═══════════════════════════════════════════════════════════

let ytPlayer = null;

window.onYouTubeIframeAPIReady = function () {
  state.ytReady = true;
  if (state.pendingVideoId) {
    _createYTPlayer(state.pendingVideoId);
    state.pendingVideoId = null;
  }
};

function initYTPlayer(videoId) {
  const wrap = document.getElementById('player-wrap');
  wrap.innerHTML = '<div id="yt-player-el"></div>';

  if (!state.ytReady) {
    state.pendingVideoId = videoId;
    return;
  }
  _createYTPlayer(videoId);
}

function _createYTPlayer(videoId) {
  if (ytPlayer) { try { ytPlayer.destroy(); } catch {} ytPlayer = null; }

  ytPlayer = new YT.Player('yt-player-el', {
    videoId,
    host: 'https://www.youtube-nocookie.com',
    playerVars: {
      autoplay:       1,
      controls:       0,   // hide YouTube's native controls & hover play button
      rel:            0,
      modestbranding: 1,
      iv_load_policy: 3,
      playsinline:    1,
      disablekb:      1,   // disable keyboard shortcuts (prevents accidental YT hotkeys)
    },
    events: {
      onReady:       _onPlayerReady,
      onStateChange: _onStateChange,
    },
  });
}

function _onPlayerReady() {
  state.isPlaying = true;
  document.getElementById('ctrl-play').textContent = '⏸';
  hidePlayerLoading();
  renderDots();
  startTimeTracking();
  // Show home button briefly then dim it
  const hb = document.getElementById('player-home-btn');
  hb.classList.remove('dim');
  setTimeout(() => hb.classList.add('dim'), 3000);
}

function _onStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    if (state.gracePeriod) { showTimeUpScreen(); return; }
    nextVideo();
  } else if (e.data === YT.PlayerState.PLAYING) {
    state.isPlaying = true;
    document.getElementById('ctrl-play').textContent = '⏸';
  } else if (e.data === YT.PlayerState.PAUSED) {
    state.isPlaying = false;
    document.getElementById('ctrl-play').textContent = '▶';
  }
}

// ═══════════════════════════════════════════════════════════
// PLAYER CONTROLS
// ═══════════════════════════════════════════════════════════

function startPlayingCurrent() {
  const video = state.currentVideos[state.currentIndex];
  if (!video) { showPlayerError('No videos available.'); return; }
  document.getElementById('ctrl-play').textContent = '⏸';
  state.isPlaying = true;
  initYTPlayer(video.videoId);
  addToHistory(video);
  // Loading overlay is hidden in _onPlayerReady
}

function nextVideo() {
  if (!state.currentVideos.length) return;

  // In wind-down mode, pick from the short video pool if available
  let pool = state.currentVideos;
  if (state.windDownMode && state.windDownVideos.length) {
    pool = state.windDownVideos;
    const idx = Math.floor(Math.random() * pool.length);
    state.currentVideos = pool;
    state.currentIndex  = idx;
  } else {
    state.currentIndex = (state.currentIndex + 1) % state.currentVideos.length;
  }

  hidePlayerControls();
  showPlayerLoading();
  startPlayingCurrent();
}

function prevVideo() {
  if (!state.currentVideos.length) return;
  state.currentIndex = (state.currentIndex - 1 + state.currentVideos.length) % state.currentVideos.length;
  hidePlayerControls();
  showPlayerLoading();
  startPlayingCurrent();
}

function closePlayer() {
  clearTimeout(state.controlsTimer);
  stopTimeTracking();
  if (ytPlayer) { try { ytPlayer.destroy(); } catch {} ytPlayer = null; }
  document.getElementById('player-wrap').innerHTML = '';
  hidePlayerLoading();
  hidePlayerControls();
  hideTimeBanner();
  state.currentCatId   = null;
  state.selectedCatIds = new Set(); // Reset selection — fresh start every visit
  renderHome();
  showScreen('screen-home');
}

function togglePlayPause() {
  if (!ytPlayer) return;
  if (state.isPlaying) {
    ytPlayer.pauseVideo();
  } else {
    ytPlayer.playVideo();
  }
  resetControlsTimer();
}

function showPlayerControls() {
  document.getElementById('player-controls').classList.remove('hidden');
  document.getElementById('player-home-btn').classList.remove('dim');
  resetControlsTimer();
}
function hidePlayerControls() {
  document.getElementById('player-controls').classList.add('hidden');
  document.getElementById('player-home-btn').classList.add('dim');
  clearTimeout(state.controlsTimer);
}
function resetControlsTimer() {
  clearTimeout(state.controlsTimer);
  state.controlsTimer = setTimeout(hidePlayerControls, 3500);
}

function showPlayerLoading(catName) {
  const el = document.getElementById('player-loading');
  el.classList.remove('hidden');
  if (catName) document.getElementById('player-loading-text').textContent = 'Loading ' + catName + '…';
}
function hidePlayerLoading() {
  document.getElementById('player-loading').classList.add('hidden');
}

function showPlayerError(msg) {
  hidePlayerLoading();
  document.getElementById('player-wrap').innerHTML = `
    <div style="color:#fff;display:flex;flex-direction:column;align-items:center;
      justify-content:center;height:100%;gap:14px;padding:36px;text-align:center;">
      <div style="font-size:52px">😔</div>
      <div style="font-size:18px;font-weight:700">No videos found</div>
      <div style="color:rgba(255,255,255,.5);font-size:14px;line-height:1.5">${msg}</div>
      <button onclick="closePlayer()"
        style="margin-top:12px;padding:13px 28px;background:rgba(255,255,255,.14);
        border:1px solid rgba(255,255,255,.25);border-radius:100px;color:#fff;
        font-size:16px;cursor:pointer;font-weight:600">⬅ Go Back</button>
    </div>`;
}

function showCatLabel(name) {
  const el = document.getElementById('player-cat-label');
  el.textContent = name;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

function renderDots() {
  const total = state.currentVideos.length;
  const cur   = state.currentIndex;
  const el    = document.getElementById('player-dots');
  const SHOW  = Math.min(total, 15);
  let start   = Math.max(0, cur - Math.floor(SHOW / 2));
  if (start + SHOW > total) start = Math.max(0, total - SHOW);
  el.innerHTML = '';
  for (let i = start; i < start + SHOW; i++) {
    const d = document.createElement('div');
    const dist = Math.abs(i - cur);
    d.className = 'pdot' + (i === cur ? ' active' : dist === 1 ? ' near' : '');
    el.appendChild(d);
  }
}

// Wire up tap zone and buttons
document.getElementById('player-tap-zone').addEventListener('click', () => {
  const ctrl = document.getElementById('player-controls');
  ctrl.classList.contains('hidden') ? showPlayerControls() : hidePlayerControls();
});
document.getElementById('ctrl-back').addEventListener('click',  e => { e.stopPropagation(); prevVideo(); });
document.getElementById('ctrl-play').addEventListener('click',  e => { e.stopPropagation(); togglePlayPause(); });
document.getElementById('ctrl-next').addEventListener('click',  e => { e.stopPropagation(); nextVideo(); });

// ═══════════════════════════════════════════════════════════
// TIME TRACKING & LIMIT
// ═══════════════════════════════════════════════════════════

function startTimeTracking() {
  stopTimeTracking();
  state.timeInterval = setInterval(_tick, 1000);
}

function stopTimeTracking() {
  if (state.timeInterval) { clearInterval(state.timeInterval); state.timeInterval = null; }
}

function _tick() {
  addUsedSeconds(1);
  const rem = getRemainingSeconds();
  checkTimeWarnings(rem);
  if (rem === 0 && !state.gracePeriod) _handleTimeUp();
}

function checkTimeWarnings(rem) {
  const m = Math.floor(rem / 60);
  if (rem > 0 && rem <= 60 && !state.warningsShown.has(1)) {
    state.warningsShown.add(1);
    showTimeBanner('⏰ 1 minute left!', 'red');
    setTimeout(hideTimeBanner, 5000);
  } else if (m <= 5 && m > 1 && !state.warningsShown.has(5)) {
    state.warningsShown.add(5);
    showTimeBanner('⏰ 5 minutes left', 'orange');
    setTimeout(hideTimeBanner, 5000);
    _triggerWindDown();
  } else if (m <= 10 && m > 5 && !state.warningsShown.has(10)) {
    state.warningsShown.add(10);
    showTimeBanner('⏰ 10 minutes left', 'yellow');
    setTimeout(hideTimeBanner, 5000);
  }
}

function showTimeBanner(msg, color) {
  const el = document.getElementById('time-banner');
  el.textContent = msg;
  el.className = 'show ' + color;
}
function hideTimeBanner() {
  document.getElementById('time-banner').className = '';
}

/* Fetch short videos in background to queue up as time winds down */
async function _triggerWindDown() {
  if (state.windDownMode) return;
  state.windDownMode = true;
  // currentCatId may be a single id or "id1,id2,..." for multi-cat sessions
  const activeIds = (state.currentCatId || '').split(',').filter(Boolean);
  const activeCats = DEFAULT_CATEGORIES.filter(c => activeIds.includes(c.id));
  if (!activeCats.length) return;
  const { apiKey } = getConfig();
  try {
    const allChannels = activeCats.flatMap(c => c.channels);
    const results = await Promise.allSettled(
      allChannels.map(ch => fetchChannelPage(ch.id, apiKey, null, 'short'))
    );
    const videos = [];
    results.forEach(r => { if (r.status === 'fulfilled') videos.push(...r.value.videos); });
    if (videos.length) state.windDownVideos = shuffleArray(videos);
  } catch {}
}

/* Called when timer hits 0 */
function _handleTimeUp() {
  stopTimeTracking();
  if (!ytPlayer) { showTimeUpScreen(); return; }
  try {
    const dur  = ytPlayer.getDuration?.() || 0;
    const pos  = ytPlayer.getCurrentTime?.() || 0;
    const left = dur - pos;
    if (left > 0 && left < 300) {
      // Less than 5 min left — let the video finish
      state.gracePeriod = true;
      showTimeBanner('Finishing up…', 'red');
      return;
    }
  } catch {}
  showTimeUpScreen();
}

function showTimeUpScreen() {
  stopTimeTracking();
  if (ytPlayer) { try { ytPlayer.destroy(); } catch {} ytPlayer = null; }
  document.getElementById('player-wrap').innerHTML = '';
  hideTimeBanner();
  document.getElementById('extend-options').classList.add('hidden');
  document.getElementById('timeup-override-btn').style.display = '';
  showScreen('screen-timeup');
}

/* Parent override — add more time */
function addTime(minutes) {
  const cfg = getConfig();
  if (minutes >= 999) {
    cfg.timeLimitMinutes = 999;
  } else {
    // Increase today's limit by adding to current usage so remaining = minutes
    const used = getUsedSeconds();
    const newLimit = Math.ceil((used / 60) + minutes);
    cfg.timeLimitMinutes = newLimit;
  }
  saveConfig(cfg);
  document.getElementById('extend-options').classList.add('hidden');
  renderHome();
  showScreen('screen-home');
}

document.getElementById('timeup-override-btn').addEventListener('click', () => {
  goAdminPin('extend');
});

// ═══════════════════════════════════════════════════════════
// ADMIN PIN
// ═══════════════════════════════════════════════════════════

function goAdminPin(action = 'admin') {
  state.pinAction = action;
  state.pinEntry  = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-sub').textContent =
    action === 'extend' ? 'Enter PIN to add more time' : 'Enter your PIN';
  document.getElementById('pin-cancel-btn').onclick = () => {
    showScreen(action === 'extend' ? 'screen-timeup' : 'screen-home');
  };
  showScreen('screen-admin-pin');
}

function pinTap(d) {
  if (state.pinEntry.length >= 4) return;
  state.pinEntry += d;
  updatePinDots();
  if (state.pinEntry.length === 4) setTimeout(_checkPin, 150);
}
function pinDel() {
  state.pinEntry = state.pinEntry.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
}
function updatePinDots() {
  [0,1,2,3].forEach(i =>
    document.getElementById('dot-' + i).classList.toggle('filled', i < state.pinEntry.length)
  );
}
function _checkPin() {
  const { adminPin } = getConfig();
  if (state.pinEntry === adminPin) {
    state.pinEntry = '';
    updatePinDots();
    if (state.pinAction === 'extend') {
      // Show extend options on time-up screen
      showScreen('screen-timeup');
      document.getElementById('timeup-override-btn').style.display = 'none';
      document.getElementById('extend-options').classList.remove('hidden');
    } else {
      openAdmin();
    }
  } else {
    document.getElementById('pin-error').textContent = 'Wrong PIN — try again';
    state.pinEntry = '';
    updatePinDots();
    const dots = document.getElementById('pin-dots');
    dots.style.animation = 'none';
    void dots.offsetHeight;
    dots.style.animation = 'shake 0.3s ease';
  }
}

// ═══════════════════════════════════════════════════════════
// ADMIN DASHBOARD
// ═══════════════════════════════════════════════════════════

function openAdmin() {
  switchTab('history');
  showScreen('screen-admin');
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['history','categories','settings'][i] === name)
  );
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history')    _renderHistory();
  if (name === 'categories') _renderCategories();
  if (name === 'settings')   _renderSettings();
}

/* ── History ── */
function _renderHistory() {
  const h   = getHistory();
  const el  = document.getElementById('tab-history');
  if (!h.length) {
    el.innerHTML = `<div class="empty-state"><div class="em">📺</div>
      <p>No watch history yet.</p></div>`;
    return;
  }
  let html = `<div class="history-meta">
    <div class="history-count">${h.length} video${h.length!==1?'s':''} watched</div>
    <button class="btn-clear" id="clear-hist-btn">Clear All</button>
  </div><div class="history-list">`;
  h.forEach(item => {
    const d = new Date(item.watchedAt);
    const label = d.toLocaleDateString(undefined,{month:'short',day:'numeric'})
                + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    html += `<div class="history-row">
      ${item.thumb ? `<img class="history-thumb" src="${esc(item.thumb)}" alt="" loading="lazy">` : `<div class="history-thumb"></div>`}
      <div class="history-info">
        <div class="history-title">${esc(item.title||'Unknown')}</div>
        <div class="history-sub">${esc(item.channel||'')} · ${esc(label)}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
  document.getElementById('clear-hist-btn').onclick = () => {
    if (!confirm('Clear all history?')) return;
    saveHistory([]);
    _renderHistory();
  };
}

/* ── Categories (show/hide) ── */
function _renderCategories() {
  const vis = getCatVisibility();
  const el  = document.getElementById('tab-categories');
  el.innerHTML = '<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Toggle categories on or off for all viewers.</p>';
  DEFAULT_CATEGORIES.forEach(cat => {
    const isOn = vis[cat.id] !== false;
    const row  = document.createElement('div');
    row.className = 'cat-toggle-row';
    const chNames = cat.channels.map(c => c.name).join(', ');
    row.innerHTML = `
      <div class="cat-toggle-art">${SVG[cat.svgKey]||''}</div>
      <div class="cat-toggle-info">
        <div class="cat-toggle-name">${esc(cat.name)}</div>
        <div class="cat-toggle-channels">${esc(chNames)}</div>
      </div>
      <label class="toggle-wrap">
        <input type="checkbox" class="toggle-input" data-catid="${cat.id}" ${isOn?'checked':''}>
        <span class="toggle-slider"></span>
      </label>
    `;
    row.querySelector('.toggle-input').addEventListener('change', function() {
      const v = getCatVisibility();
      v[this.dataset.catid] = this.checked;
      saveCatVisibility(v);
    });
    el.appendChild(row);
  });
}

/* ── Settings ── */
function _renderSettings() {
  const cfg       = getConfig();
  const overrides = getChannelOverrides();
  const el        = document.getElementById('tab-settings');

  let html = `
  <div class="settings-section">
    <div class="settings-section-title">Time Limit</div>
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-label">Daily limit (minutes)
          <small>Set to 9999 for no limit</small>
        </div>
        <input class="settings-input" id="s-limit" type="number" min="1" max="9999"
          value="${cfg.timeLimitMinutes}"/>
      </div>
      <div class="settings-row">
        <div class="settings-label">Time used today
          <small>Resets at midnight</small>
        </div>
        <div style="color:var(--muted);font-size:14px">${formatTime(getUsedSeconds())}</div>
      </div>
    </div>
    <button class="save-btn" style="margin-top:8px" onclick="_saveTimeSetting()">Save Time Limit</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Security</div>
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-label">Admin PIN</div>
        <input class="settings-input" id="s-pin" type="password" maxlength="6"
          placeholder="(keep blank to leave unchanged)"/>
      </div>
      <div class="settings-row">
        <div class="settings-label">YouTube API Key</div>
        <input class="settings-input" id="s-apikey" type="password"
          placeholder="(keep blank to leave unchanged)"/>
      </div>
    </div>
    <button class="save-btn" style="margin-top:8px" onclick="_saveSecuritySettings()">Save Security</button>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Channel IDs</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:12px">
      If a category shows "No videos found", update the channel ID here.
      Find IDs at youtube.com/channel/UC…
    </p>
    <div id="ch-id-list"></div>
    <button class="save-btn" style="margin-top:8px" onclick="_saveChannelIds()">Save Channel IDs</button>
  </div>`;

  el.innerHTML = html;

  // Build channel ID inputs
  const chList = document.getElementById('ch-id-list');
  DEFAULT_CATEGORIES.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'cat-channel-header';
    hdr.textContent = cat.name;
    chList.appendChild(hdr);

    const card = document.createElement('div');
    card.className = 'settings-card';
    card.style.marginBottom = '10px';
    cat.channels.forEach((ch, i) => {
      const val = (overrides[cat.id] && overrides[cat.id][i]) || ch.id;
      const sec = document.createElement('div');
      sec.className = 'channel-edit-section';
      sec.innerHTML = `
        <div class="channel-edit-label">${esc(ch.name)}</div>
        <input class="channel-id-input"
          data-catid="${esc(cat.id)}" data-chi="${i}"
          value="${esc(val)}" placeholder="UC…"/>`;
      card.appendChild(sec);
    });
    chList.appendChild(card);
  });
}

function _saveTimeSetting() {
  const cfg = getConfig();
  const v   = parseInt(document.getElementById('s-limit').value);
  if (v > 0) cfg.timeLimitMinutes = v;
  saveConfig(cfg);
  alert('✅ Time limit saved!');
}
function _saveSecuritySettings() {
  const cfg = getConfig();
  const pin = document.getElementById('s-pin').value.trim();
  const key = document.getElementById('s-apikey').value.trim();
  if (pin) cfg.adminPin = pin;
  if (key) { cfg.apiKey = key; Object.keys(_videoCache).forEach(k => delete _videoCache[k]); }
  saveConfig(cfg);
  alert('✅ Security settings saved!');
}
function _saveChannelIds() {
  const overrides = {};
  document.querySelectorAll('.channel-id-input').forEach(input => {
    const { catid, chi } = input.dataset;
    if (!overrides[catid]) overrides[catid] = {};
    overrides[catid][parseInt(chi)] = input.value.trim();
  });
  saveChannelOverrides(overrides);
  Object.keys(_videoCache).forEach(k => delete _videoCache[k]);
  alert('✅ Channel IDs saved! Cache cleared.');
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h ? `${h}h ${m}m` : `${m}m ${s}s`;
}
