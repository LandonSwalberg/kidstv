<html lang="en">

  <meta name="apple-mobile-web-app-title" content="KidsTV">

  <title>KidsTV</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    :root {
      --bg: #0f0e17; --bg2: #1a1929; --card: #1f1e30; --card2: #27263a;
      --text: #fffffe; --muted: #8b8fa8; --accent: #e8b84b; --radius: 18px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh; overflow: hidden;
      user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .screen.active { opacity: 1; pointer-events: all; }
    .screen-header {
      display: flex; align-items: center; gap: 14px; padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .screen-title { font-size: 20px; font-weight: 700; }
    .btn-icon {
      width: 40px; height: 40px; border-radius: 50%; background: var(--card2);
      border: none; color: var(--text); display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 18px; flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-icon:active { background: #3a3860; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-center {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; color: var(--muted); font-size: 15px;
    }
    .error-state { padding: 48px 24px; text-align: center; }
    .err-icon { font-size: 48px; margin-bottom: 12px; }
    .error-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .error-state p { color: var(--muted); font-size: 14px; line-height: 1.5; }
    #screen-kid-home { background: var(--bg); }
    .kid-header {
      display: flex; align-items: center; justify-content: center;
      padding: 28px 20px 8px; flex-shrink: 0; position: relative;
    }
    .kid-title {
      font-size: 26px; font-weight: 900; color: var(--accent);
      letter-spacing: -0.5px; cursor: default;
      -webkit-user-select: none; user-select: none;
    }
    .kid-home-body {
      flex: 1; display: flex; flex-direction: column;
      overflow-y: auto; padding: 16px 20px 32px; gap: 14px;
    }
    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
    }
    .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    @media (min-width: 560px) { .cat-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px) { .cat-grid { grid-template-columns: repeat(4, 1fr); } }
    .cat-card {
      aspect-ratio: 1; border-radius: 20px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: transform 0.15s;
    }
    .cat-card:active { transform: scale(0.91); }
    .cat-card-emoji { font-size: clamp(36px, 8vw, 52px); line-height: 1; }
    .cat-card-name {
      font-size: clamp(13px, 2.8vw, 16px); font-weight: 800; text-align: center;
      color: white; text-shadow: 0 1px 6px rgba(0,0,0,0.6); padding: 0 8px;
    }
    .cat-header-banner { display: flex; align-items: center; gap: 14px; padding: 20px; flex-shrink: 0; }
    .cat-header-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
    }
    .cat-header-name { font-size: 20px; font-weight: 800; }
    .cat-header-count { font-size: 13px; color: var(--muted); margin-top: 1px; }
    .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 0 16px 32px; }
    @media (min-width: 560px) { .video-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 800px) { .video-grid { grid-template-columns: repeat(4, 1fr); } }
    .video-card {
      background: var(--card); border-radius: 16px; overflow: hidden;
      cursor: pointer; transition: transform 0.15s;
    }
    .video-card:active { transform: scale(0.93); }
    .video-thumb-wrap { position: relative; aspect-ratio: 16/9; background: var(--bg2); overflow: hidden; }
    .video-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.18); opacity: 0; transition: opacity 0.15s;
    }
    .video-card:hover .play-overlay { opacity: 1; }
    .play-overlay-icon {
      width: 44px; height: 44px; background: rgba(0,0,0,0.7); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; padding-left: 3px;
    }
    .video-info { padding: 10px 12px 12px; }
    .video-title {
      font-size: 13px; font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-channel { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #screen-player { overflow: hidden !important; touch-action: none; }
    #player-wrap { position: absolute; inset: 0; }
    #player-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
    .player-overlay {
      position: absolute; top: 0; left: 0; right: 0; padding: 16px 16px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex; align-items: center; gap: 12px; z-index: 20; pointer-events: none;
    }
    .player-overlay button { pointer-events: all; }
    .player-back {
      display: flex; align-items: center; gap: 8px; padding: 10px 18px;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 100px; color: white; font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    .player-title-text {
      flex: 1; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .player-next {
      display: flex; align-items: center; gap: 8px; padding: 10px 18px;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.18);
      border-radius: 100px; color: white; font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }
    #screen-admin-pin { align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .pin-card {
      background: var(--card); border-radius: 24px; padding: 36px 28px 28px;
      width: 100%; max-width: 340px; text-align: center;
    }
    .pin-lock { font-size: 40px; margin-bottom: 12px; }
    .pin-card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .pin-card-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.15);
      transition: background 0.15s, transform 0.15s;
    }
    .pin-dot.filled { background: var(--accent); transform: scale(1.15); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      padding: 16px; background: var(--bg2); border: none; border-radius: 14px;
      color: var(--text); font-size: 20px; font-weight: 600; cursor: pointer;
      transition: background 0.12s, transform 0.1s;
    }
    .pin-key:active { background: #3a3860; transform: scale(0.93); }
    .pin-key.del { font-size: 16px; color: var(--muted); }
    .pin-error { color: #ff5c5c; font-size: 13px; margin-top: 14px; min-height: 18px; }
    .pin-cancel { margin-top: 16px; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; padding: 8px; }
    #screen-admin { background: var(--bg); }
    .admin-header {
      display: flex; align-items: center; gap: 14px; padding: 20px 20px 16px;

    }
    .admin-badge {

    .admin-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
    .tab-btn {

      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; padding: 20px; }
    .tab-pane.active { display: block; }
    .cat-toggle-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      background: var(--card); border-radius: 14px; margin-bottom: 10px;
    }

    .cat-toggle-info { flex: 1; }
    .cat-toggle-name { font-size: 15px; font-weight: 700; }
    .cat-toggle-channels { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .toggle-btn {
      padding: 8px 18px; border-radius: 100px; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; flex-shrink: 0;
    }
    .toggle-btn.on { background: #2e7d32; color: white; }
    .toggle-btn.off { background: var(--card2); color: var(--muted); }
    .history-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .history-stat { font-size: 14px; color: var(--muted); }
    .btn-clear {
      padding: 8px 16px; background: none; border: 1px solid rgba(255,80,80,0.4);
      border-radius: 100px; color: #ff6b6b; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-row {
      display: flex; gap: 12px; align-items: center; padding: 11px 12px;
      background: var(--card); border-radius: 14px;

    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .empty-history { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-history .bm { font-size: 48px; margin-bottom: 12px; }
    .settings-group { margin-bottom: 24px; }
    .settings-group-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); margin-bottom: 10px;
    }
    .settings-card { background: var(--card); border-radius: var(--radius); overflow: hidden; }
    .settings-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { flex: 1; font-size: 14px; }
    .settings-input {
      padding: 8px 12px; background: var(--bg2); border: 1px solid rgba(255,255,255,0.1);

    .channel-edit-row { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }

      border-radius: 10px; color: #0f0e17; font-size: 14px; font-weight: 800; cursor: pointer;

    @keyframes shake {
      0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); }

};

function getConfig() { return Object.assign({}, DEFAULT_CONFIG, store.get('ktv_config', {})); }
function saveConfig(c) { store.set('ktv_config', c); }

function getCategories() {
  try {
    const stored = store.get('ktv_categories', null);
    if (!stored) return DEFAULT_CATEGORIES;
    return DEFAULT_CATEGORIES.map(defCat => {
      const storedCat = stored.find(s => s.id === defCat.id);
      if (!storedCat) return defCat;
      return { ...defCat, channels: defCat.channels.map((ch, i) => ({ ...ch, id: (storedCat.channels[i] && storedCat.channels[i].id) || ch.id })) };
    });
  } catch { return DEFAULT_CATEGORIES; }
}
function saveCategories(cats) { store.set('ktv_categories', cats); }
function getHistory() { return store.get('ktv_history', []); }
function saveHistory(h) { store.set('ktv_history', h); }
function addToHistory(video) {
  const h = getHistory();
  h.unshift({ videoId: video.videoId, videoTitle: video.title, channelName: video.channelName, thumb: video.thumb, watchedAt: Date.now() });
  saveHistory(h.slice(0, 300));
}

function _setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}
function showScreen(id) {
  const current = document.querySelector('.screen.active');
  if (current && current.id !== id) NAV_STACK.push(current.id);
  _setScreen(id);
}
function goBack() {
  const prev = NAV_STACK.pop();
  if (!prev) { _setScreen('screen-kid-home'); return; }
  if (prev === 'screen-player') document.getElementById('player-wrap').innerHTML = '';
  _setScreen(prev);
}
history.pushState({ kidstv: 1 }, '');
window.addEventListener('popstate', () => { goBack(); history.pushState({ kidstv: 1 }, ''); });

let _tapCount = 0, _tapTimer = null;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('secret-tap-target').addEventListener('click', () => {
    _tapCount++;
    clearTimeout(_tapTimer);
    if (_tapCount >= 5) { _tapCount = 0; goAdminPin(); }
    else { _tapTimer = setTimeout(() => { _tapCount = 0; }, 3000); }
  });
});

function renderKidHome() {
  const disabled = store.get('ktv_disabled_cats', []);
  const cats = getCategories().filter(c => !disabled.includes(c.id));
  const body = document.getElementById('kid-home-body');
  body.innerHTML = '';
  if (cats.length === 0) {
    body.innerHTML = `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:40px;"><div style="font-size:64px">🔒</div><div style="font-size:20px;font-weight:800;">All channels off</div><div style="color:var(--muted);font-size:15px;">Ask a parent to turn some on.</div></div>`;
    return;
  }
  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = 'What do you want to watch?';
  body.appendChild(label);
  const grid = document.createElement('div');
  grid.className = 'cat-grid';
  cats.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.style.background = `linear-gradient(135deg, ${hexA(cat.color, 0.93)}, ${hexA(cat.color, 0.55)})`;
    card.innerHTML = `<div class="cat-card-emoji">${cat.emoji}</div><div class="cat-card-name">${esc(cat.name)}</div>`;
    card.addEventListener('click', () => openCategory(cat));
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

async function openCategory(cat) {
  S.currentCategoryId = cat.id;
  const icon = document.getElementById('cat-header-icon');
  icon.textContent = cat.emoji;
  icon.style.background = hexA(cat.color, 0.2);
  document.getElementById('cat-header-name').textContent = cat.name;
  document.getElementById('cat-header-count').textContent = '';
  const container = document.getElementById('video-grid-container');
  container.innerHTML = `<div class="loading-center"><div class="spinner"></div><div>Loading videos…</div></div>`;
  showScreen('screen-category');
  const cached = S.videoCache[cat.id];
  if (cached && (Date.now() - cached.ts < S.CACHE_TTL)) { renderVideoGrid(cached.videos, cat); return; }
  const config = getConfig();
  const allVideos = [];
  try {
    const firstResults = await Promise.allSettled(cat.channels.map(ch => fetchChannelPage(ch, config.apiKey, null)));
    const nextTokens = [];
    firstResults.forEach((r, i) => {
      if (r.status === 'fulfilled') { allVideos.push(...r.value.videos); nextTokens.push({ channel: cat.channels[i], token: r.value.nextPageToken }); }
    });
    if (allVideos.length === 0) {
      container.innerHTML = `<div class="error-state"><div class="err-icon">😔</div><h3>No videos found</h3><p>Channel ID may need updating.<br>Go to Parent Area → Settings.</p></div>`;
      return;
    }
    const shuffled = shuffleArray(allVideos);
    S.videoCache[cat.id] = { videos: shuffled, ts: Date.now() };
    renderVideoGrid(shuffled, cat);
    fetchMorePages(cat, config.apiKey, nextTokens, 2);
  } catch (err) {
    container.innerHTML = `<div class="error-state"><div class="err-icon">⚠️</div><h3>Couldn't load videos</h3><p>${esc(String(err.message || 'Unknown error'))}<br><br>Check the API key in Settings.</p></div>`;
  }
}

async function fetchChannelPage(channel, apiKey, pageToken) {
  let url = 'https://www.googleapis.com/youtube/v3/search?part=snippet'
    + '&channelId=' + encodeURIComponent(channel.id)
    + '&maxResults=50&order=date&type=video&safeSearch=strict&videoEmbeddable=true'
    + '&key=' + encodeURIComponent(apiKey);
  if (pageToken) url += '&pageToken=' + encodeURIComponent(pageToken);
  const res = await fetch(url);
  if (!res.ok) throw new Error('YouTube API error ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const videos = (data.items || [])
    .map(item => ({
      videoId: item.id.videoId, title: item.snippet.title, channelName: item.snippet.channelTitle,
      thumb: ((item.snippet.thumbnails || {}).medium || (item.snippet.thumbnails || {}).default || {}).url || '',
      publishedAt: item.snippet.publishedAt,
    }))
    .filter(v => v.videoId)
    .filter(v => !/#shorts/i.test(v.title));
  return { videos, nextPageToken: data.nextPageToken || null };
}

async function fetchMorePages(cat, apiKey, nextTokens, pagesLeft) {
  if (pagesLeft <= 0) return;
  if (S.currentCategoryId !== cat.id) return;
  const validItems = nextTokens.filter(n => n.token);
  if (!validItems.length) return;
  const results = await Promise.allSettled(validItems.map(n => fetchChannelPage(n.channel, apiKey, n.token)));
  const newVideos = [];
  const nextNextTokens = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') {
      newVideos.push(...r.value.videos);
      if (r.value.nextPageToken) nextNextTokens.push({ channel: validItems[i].channel, token: r.value.nextPageToken });
    }
  });
  if (!newVideos.length || S.currentCategoryId !== cat.id) return;
  const existing = S.videoCache[cat.id];
  if (!existing) return;
  const combined = shuffleArray([...existing.videos, ...newVideos]);
  S.videoCache[cat.id] = { ...existing, videos: combined };
  const countEl = document.getElementById('cat-header-count');
  if (countEl && document.getElementById('screen-category').classList.contains('active')) {
    countEl.textContent = combined.length + ' videos';
    renderVideoGrid(combined, cat);
  }
  if (nextNextTokens.length > 0) fetchMorePages(cat, apiKey, nextNextTokens, pagesLeft - 1);
}

function renderVideoGrid(videos, cat) {
  const container = document.getElementById('video-grid-container');
  document.getElementById('cat-header-count').textContent = videos.length + ' videos';
  const grid = document.createElement('div');
  grid.className = 'video-grid';
  videos.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `<div class="video-thumb-wrap">${v.thumb ? `<img class="video-thumb" src="${esc(v.thumb)}" alt="" loading="lazy">` : ''}<div class="play-overlay"><div class="play-overlay-icon">▶</div></div></div><div class="video-info"><div class="video-title">${esc(v.title)}</div><div class="video-channel">${esc(v.channelName)}</div></div>`;
    card.addEventListener('click', () => playVideo(videos, i));
    grid.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(grid);
}

function playVideo(videos, index) {
  S.currentVideos = videos; S.currentVideoIndex = index;
  const video = videos[index];
  document.getElementById('player-title-text').textContent = video.title;
  document.getElementById('player-wrap').innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${encodeURIComponent(video.videoId)}?autoplay=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen frameborder="0"></iframe>`;
  showScreen('screen-player');
  addToHistory(video);
}
function nextVideo() { playVideo(S.currentVideos, (S.currentVideoIndex + 1) % S.currentVideos.length); }
function closePlayer() { document.getElementById('player-wrap').innerHTML = ''; goBack(); }

function goAdminPin() {
  S.pinEntry = ''; updatePinDots();
  document.getElementById('pin-error').textContent = '';
  showScreen('screen-admin-pin');
}
function pinTap(digit) {
  if (S.pinEntry.length >= 4) return;
  S.pinEntry += digit; updatePinDots();
  if (S.pinEntry.length === 4) setTimeout(checkPin, 150);
}
function pinDel() { S.pinEntry = S.pinEntry.slice(0, -1); updatePinDots(); document.getElementById('pin-error').textContent = ''; }
function updatePinDots() { for (let i = 0; i < 4; i++) document.getElementById('dot-' + i).classList.toggle('filled', i < S.pinEntry.length); }
function checkPin() {
  const config = getConfig();
  if (S.pinEntry === config.adminPin) { S.pinEntry = ''; updatePinDots(); openAdmin(); }
  else {
    document.getElementById('pin-error').textContent = 'Wrong PIN — try again';
    S.pinEntry = ''; updatePinDots();
    const dots = document.getElementById('pin-dots');
    dots.style.animation = 'none'; void dots.offsetHeight; dots.style.animation = 'shake 0.3s ease';
  }
}

function openAdmin() { switchTab('categories'); showScreen('screen-admin'); }
function switchTab(name) {
  S.activeTab = name;
  const tabs = ['categories', 'history', 'settings'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'categories') renderAdminCategories();
  else if (name === 'history') renderAdminHistory();
  else if (name === 'settings') renderAdminSettings();
}

function renderAdminCategories() {
  const disabled = store.get('ktv_disabled_cats', []);
  const list = document.getElementById('admin-categories-list');
  list.innerHTML = '';
  getCategories().forEach(cat => {
    const isOn = !disabled.includes(cat.id);
    const row = document.createElement('div');
    row.className = 'cat-toggle-row';
    row.innerHTML = `<div class="cat-toggle-icon">${cat.emoji}</div><div class="cat-toggle-info"><div class="cat-toggle-name">${esc(cat.name)}</div><div class="cat-toggle-channels">${esc(cat.channels.map(c => c.name).join(', '))}</div></div><button class="toggle-btn ${isOn ? 'on' : 'off'}" data-catid="${esc(cat.id)}">${isOn ? '✓ On' : 'Off'}</button>`;
    row.querySelector('.toggle-btn').addEventListener('click', () => toggleCat(cat.id));
    list.appendChild(row);
  });
}
function toggleCat(catId) {
  const disabled = store.get('ktv_disabled_cats', []);
  const idx = disabled.indexOf(catId);
  if (idx >= 0) disabled.splice(idx, 1); else disabled.push(catId);
  store.set('ktv_disabled_cats', disabled); S.videoCache = {}; renderAdminCategories();
}

function renderAdminHistory() {
  const history = getHistory();
  const container = document.getElementById('history-content');
  container.innerHTML = '';
  if (history.length === 0) { container.innerHTML = `<div class="empty-history"><div class="bm">📺</div><p>No watch history yet.</p></div>`; return; }
  const controls = document.createElement('div');
  controls.className = 'history-controls';
  controls.innerHTML = `<div class="history-stat">${history.length} video${history.length !== 1 ? 's' : ''} watched</div><button class="btn-clear" id="clear-history-btn">Clear All</button>`;
  container.appendChild(controls);
  controls.querySelector('#clear-history-btn').addEventListener('click', clearHistory);
  const list = document.createElement('div');
  list.className = 'history-list';
  history.forEach(item => {
    const date = new Date(item.watchedAt);
    const row = document.createElement('div');
    row.className = 'history-row';
    row.innerHTML = `${item.thumb ? `<img class="history-thumb" src="${esc(item.thumb)}" alt="" loading="lazy">` : `<div class="history-thumb"></div>`}<div class="history-info"><div class="history-title">${esc(item.videoTitle || 'Unknown')}</div><div class="history-meta">${esc(item.channelName || '')} · ${date.toLocaleDateString(undefined,{month:'short',day:'numeric'})} at ${date.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    list.appendChild(row);
  });
  container.appendChild(list);
}
function clearHistory() { if (!confirm('Clear all watch history?')) return; saveHistory([]); renderAdminHistory(); }

function renderAdminSettings() {
  document.getElementById('settings-pin').value = '';
  document.getElementById('settings-apikey').value = '';
  const categories = getCategories();
  const settingsList = document.getElementById('channel-settings-list');
  settingsList.innerHTML = '';
  categories.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'cat-section-header';
    header.textContent = cat.emoji + ' ' + cat.name;
    settingsList.appendChild(header);
    const card = document.createElement('div');
    card.className = 'settings-card'; card.style.marginBottom = '10px';
    cat.channels.forEach((ch, i) => {
      const row = document.createElement('div');
      row.className = 'channel-edit-row';
      row.innerHTML = `<div class="channel-edit-label">${esc(ch.name)}</div><input class="channel-id-input" data-catid="${esc(cat.id)}" data-chindex="${i}" value="${esc(ch.id)}" placeholder="YouTube Channel ID" />`;
      card.appendChild(row);
    });
    settingsList.appendChild(card);
  });
}
function saveAppSettings() {
  const config = getConfig();
  const pin = document.getElementById('settings-pin').value.trim();
  const api = document.getElementById('settings-apikey').value.trim();
  if (pin) config.adminPin = pin;
  if (api) config.apiKey = api;
  saveConfig(config); S.videoCache = {};
  alert('✅ Settings saved!'); renderAdminSettings();
}
function saveChannelSettings() {
  const categories = getCategories();
  document.querySelectorAll('.channel-id-input').forEach(input => {
    const cat = categories.find(c => c.id === input.dataset.catid);
    if (cat && cat.channels[parseInt(input.dataset.chindex)]) cat.channels[parseInt(input.dataset.chindex)].id = input.value.trim();
  });
  saveCategories(categories); S.videoCache = {};
  alert('✅ Channel IDs saved!');
}

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function hexA(hex, alpha) {
  try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${alpha})`; }
  catch { return `rgba(100,100,200,${alpha})`; }
}
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));

(function init() {
  history.pushState({ kidstv: 1 }, '');
  renderKidHome();
  _setScreen('screen-kid-home');
})();
</script>
